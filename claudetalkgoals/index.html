<style>

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100dvh;}
  header{padding:2.4vh 4vw 0;flex:0 0 auto;}
  h1{font-size:clamp(17px,3vw,40px);font-weight:600;letter-spacing:-.4px;line-height:1.15;}
  .sub{color:var(--muted);font-size:clamp(11px,1.4vw,18px);margin-top:5px;}
  .legend{display:flex;flex-wrap:wrap;gap:10px 16px;margin:10px 0 4px;font-size:clamp(11px,1.15vw,16px);color:var(--muted);}
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex:0 0 auto;}
  #chart{flex:1 1 auto;width:100%;min-height:0;position:relative;}
  #chart svg{width:100%;height:100%;display:block;}
  circle{cursor:pointer;}
  .sel-circle{stroke:#fff;animation:ringpulse 1.3s ease-in-out infinite;}
  @keyframes ringpulse{0%,100%{stroke-width:2;}50%{stroke-width:6;}}
  #panel{flex:0 0 auto;max-height:0;overflow:hidden;background:var(--panel);
    border-top:1px solid var(--line);transition:max-height .25s ease;}
  #panel.open{max-height:44dvh;}
  .phead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;position:sticky;top:0;background:var(--panel);}
  .phead h3{font-size:16px;color:#fff;text-transform:capitalize;font-weight:600;}
  .phead .cnt{color:var(--muted);font-weight:400;font-size:13px;margin-left:6px;}
  .pclose{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;
    padding:5px 12px;font-size:14px;cursor:pointer;}
  .pclose:active{background:#262c36;}
  .plist{overflow-y:auto;max-height:calc(44dvh - 48px);-webkit-overflow-scrolling:touch;padding:0 16px 16px;}
  .plist div{padding:9px 0;border-top:1px solid var(--line);color:#e6eaf0;font-size:15px;line-height:1.45;}
  .plist div:first-child{border-top:none;}
  .plist .nm{color:#8b9bb4;}
</style>

function openPanel(word){
  selected=word;
  const items=VERB[word]||[];
  document.getElementById("pword").textContent=word;
  document.getElementById("pcnt").textContent="· "+items.length+(items.length===1?" person":" people");
  document.getElementById("plist").innerHTML=items.map(o=>
    `<div>&ldquo;${esc(o.t)}&rdquo; <span class="nm">${o.n?"— "+esc(o.n):""}</span></div>`).join("");
  panel.classList.add("open");
  document.getElementById("plist").scrollTop=0;
  highlight(word);
}
function closePanel(){panel.classList.remove("open");selected=null;clearHighlight();}
document.getElementById("pclose").addEventListener("click",closePanel);

function clearHighlight(){

  a.setAttribute("dur",dur);a.setAttribute("begin",begin);
  a.setAttribute("repeatCount","indefinite");a.setAttribute("calcMode","spline");
  a.setAttribute("keySplines","0.3 0 0.3 1");a.setAttribute("keyTimes","0;1");
  parent.appendChild(a);
}
function highlight(word){
  clearHighlight();
  const node=gsel.filter(d=>d.word===word);
  node.raise();
  const d=node.datum();
  // wavy ripple rings emanating from the clicked bubble
  const rg=node.insert("g",":first-child").attr("class","ripple");
  for(let i=0;i<3;i++){
    const rc=document.createElementNS(SVGNS,"circle");
    rc.setAttribute("r",d.rad);rc.setAttribute("fill","none");
    rc.setAttribute("stroke",d.col);rc.setAttribute("stroke-width","2.5");rc.setAttribute("opacity","0");
    addAnim(rc,"r",d.rad,d.rad+42,"1.9s",(i*0.63)+"s");
    addAnim(rc,"opacity","0.55","0","1.9s",(i*0.63)+"s");
    rg.node().appendChild(rc);
  }
  node.select("circle.main").classed("sel-circle",true).attr("filter","url(#glow)");
}

function draw(){
  const W=Math.max(2,chart.clientWidth), H=Math.max(2,chart.clientHeight);
  chart.innerHTML="";
  const total=d3.sum(data,d=>d[1]);
  const fill=0.56;
  let k=Math.sqrt(fill*W*H/(Math.PI*total));
  const rMax=Math.min(W,H)*0.24, rMin=Math.max(13,Math.min(W,H)*0.045);
  const nodes=data.map(d=>({word:d[0],n:d[1],col:d[2],
    rad:Math.max(rMin,Math.min(rMax,k*Math.sqrt(d[1])))}));
  const svg=d3.select(chart).append("svg")
    .attr("viewBox",`0 0 ${W} ${H}`).attr("preserveAspectRatio","xMidYMid meet");
  const defs=svg.append("defs");
  defs.html('<filter id="glow" x="-70%" y="-70%" width="240%" height="240%">'+
    '<feGaussianBlur stdDeviation="7" result="b"/>'+
    '<feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>');
  const g=svg.selectAll("g.node").data(nodes).join("g").attr("class","node")
    .style("cursor","pointer").on("click",(e,d)=>openPanel(d.word));
  g.append("circle").attr("class","main").attr("r",d=>d.rad).attr("fill",d=>d.col).attr("opacity",.93);
  g.append("text").attr("text-anchor","middle").attr("dy","-0.03em").attr("fill","#fff")
    .style("pointer-events","none").style("font-weight",600)
    .style("font-size",d=>{const byR=d.rad*0.5,byLen=(d.rad*1.85)/Math.max(4,d.word.length)*1.35;
      return Math.max(9,Math.min(byR,byLen,26))+"px";})
    .text(d=>d.rad>=Math.max(16,rMin)?d.word:"");
  g.append("text").attr("text-anchor","middle").attr("dy","1.15em").attr("fill","#fff")
    .attr("opacity",.9).style("pointer-events","none")
    .style("font-size",d=>Math.max(9,Math.min(d.rad*0.34,18))+"px")
    .text(d=>d.rad>Math.max(30,rMin*1.6)?d.n:"");
  const sim=d3.forceSimulation(nodes)
    .force("x",d3.forceX(W/2).strength(.06)).force("y",d3.forceY(H/2).strength(.06))
    .force("charge",d3.forceManyBody().strength(1.5))
    .force("collide",d3.forceCollide().radius(d=>d.rad+2).strength(1).iterations(2)).stop();
  for(let i=0;i<420;i++){
    sim.tick();
    nodes.forEach(d=>{d.x=Math.max(d.rad,Math.min(W-d.rad,d.x));d.y=Math.max(d.rad,Math.min(H-d.rad,d.y));});
  }
  g.attr("transform",d=>`translate(${d.x},${d.y})`);
  gsel=g;
  if(selected) highlight(selected);
}
draw();
// Only re-layout on a real window resize / rotation. Opening the panel just scales the SVG (no reshuffle).
let rt;
addEventListener("resize",()=>{clearTimeout(rt);rt=setTimeout(draw,180);});
addEventListener("orientationchange",()=>{clearTimeout(rt);rt=setTimeout(draw,250);});
</script>
</body>
